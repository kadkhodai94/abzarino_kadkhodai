name: Build Latest Abzarino Flutter ZIP APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find latest ZIP in repository root
        id: find_zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE=$(ls -t *.zip 2>/dev/null | head -n 1 || true)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in root. Will try to build repository files directly."
            echo "zip_file=" >> "$GITHUB_OUTPUT"
          else
            echo "Latest ZIP: $ZIP_FILE"
            echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract latest ZIP if present
        if: steps.find_zip.outputs.zip_file != ''
        shell: bash
        run: |
          set -euo pipefail
          rm -rf extracted_project
          mkdir -p extracted_project
          unzip -q -o "${{ steps.find_zip.outputs.zip_file }}" -d extracted_project
          echo "Extracted ZIP structure:"
          find extracted_project -maxdepth 3 -type f | sed 's#^#- #' | head -120

      - name: Locate Flutter project
        id: locate_project
        shell: bash
        run: |
          set -euo pipefail
          if [ -d extracted_project ]; then
            PROJECT_DIR=$(find extracted_project -name pubspec.yaml -type f -printf '%h\n' | head -n 1 || true)
          else
            PROJECT_DIR=$(find . -name pubspec.yaml -type f -not -path './extracted_project/*' -printf '%h\n' | head -n 1 || true)
          fi
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: No Flutter project found. pubspec.yaml is missing."
            exit 1
          fi
          echo "Flutter project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create missing Android platform
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            flutter create --platforms=android --org ir.gamino.abzarino .
          fi

      - name: Force stable Android SDK 34
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          candidates = [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]
          app_gradle = next((p for p in candidates if p.exists()), None)
          if app_gradle is None:
              raise SystemExit('android/app/build.gradle or build.gradle.kts not found after flutter create')

          s = app_gradle.read_text(encoding='utf-8')
          if app_gradle.suffix == '.kts':
              s = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 34', s)
              s = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 34', s)
              if 'compileSdk' not in s:
                  s = s.replace('android {', 'android {\n    compileSdk = 34', 1)
          else:
              s = re.sub(r'compileSdk\s*=\s*[^\n]+', 'compileSdk = 34', s)
              s = re.sub(r'compileSdkVersion\s+[^\n]+', 'compileSdkVersion 34', s)
              s = re.sub(r'targetSdk\s*=\s*[^\n]+', 'targetSdk = 34', s)
              s = re.sub(r'targetSdkVersion\s+[^\n]+', 'targetSdkVersion 34', s)
              if 'compileSdk' not in s and 'compileSdkVersion' not in s:
                  s = s.replace('android {', 'android {\n    compileSdk = 34', 1)

          app_gradle.write_text(s, encoding='utf-8')
          print(app_gradle)
          print(app_gradle.read_text(encoding='utf-8')[:1600])
          PY

      - name: Force compatible Flutter Android lifecycle dependency
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('pubspec.yaml')
          s = p.read_text(encoding='utf-8')
          s = s.replace('version: 1.3.2+6', 'version: 1.3.3+7')
          s = s.replace('version: 1.3.1+5', 'version: 1.3.3+7')
          s = s.replace('version: 1.3.0+4', 'version: 1.3.3+7')
          if 'flutter_plugin_android_lifecycle:' not in s:
              s = s.rstrip() + '\n\ndependency_overrides:\n  flutter_plugin_android_lifecycle: 2.0.24\n'
          elif 'dependency_overrides:' not in s:
              s = s.rstrip() + '\n\ndependency_overrides:\n  flutter_plugin_android_lifecycle: 2.0.24\n'
          p.write_text(s, encoding='utf-8')
          print(p.read_text(encoding='utf-8'))
          PY

      - name: Force Android app label and biometric permission
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          if manifest.exists():
              s = manifest.read_text(encoding='utf-8')
              if 'android.permission.USE_BIOMETRIC' not in s:
                  s = s.replace('<application', '<uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <application', 1)
              if 'android:label=' in s:
                  s = re.sub(r'android:label="[^"]*"', 'android:label="ابزارینو"', s, count=1)
              else:
                  s = s.replace('<application', '<application android:label="ابزارینو"', 1)
              manifest.write_text(s, encoding='utf-8')
          PY

      - name: Patch Android for biometric authentication
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          for kt in Path('android/app/src/main/kotlin').rglob('MainActivity.kt'):
              text = kt.read_text(encoding='utf-8')
              text = text.replace('import io.flutter.embedding.android.FlutterActivity', 'import io.flutter.embedding.android.FlutterFragmentActivity')
              text = text.replace('FlutterActivity()', 'FlutterFragmentActivity()')
              kt.write_text(text, encoding='utf-8')
          for java in Path('android/app/src/main/java').rglob('MainActivity.java'):
              text = java.read_text(encoding='utf-8')
              text = text.replace('import io.flutter.embedding.android.FlutterActivity;', 'import io.flutter.embedding.android.FlutterFragmentActivity;')
              text = text.replace('extends FlutterActivity', 'extends FlutterFragmentActivity')
              java.write_text(text, encoding='utf-8')
          PY

      - name: Get Flutter dependencies
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        run: flutter pub get

      - name: Analyze project
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        run: flutter analyze || true

      - name: Build release APK
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        run: flutter build apk --release --no-shrink --build-name=1.3.3 --build-number=7

      - name: Build release AAB
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        run: flutter build appbundle --release --no-shrink --build-name=1.3.3 --build-number=7 || true

      - name: Collect outputs
        working-directory: ${{ steps.locate_project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final_outputs
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk final_outputs/abzarino_v1_3_3_release.apk
          fi
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            cp build/app/outputs/bundle/release/app-release.aab final_outputs/abzarino_v1_3_3_release.aab
          fi
          ls -lah final_outputs

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abzarino-v1-3-3-apk
          path: ${{ steps.locate_project.outputs.project_dir }}/final_outputs/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: abzarino-v1-3-3-aab
          path: ${{ steps.locate_project.outputs.project_dir }}/final_outputs/*.aab
          if-no-files-found: ignore
